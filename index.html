<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RustDrop</title>
  <link rel="stylesheet" href="./style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>

<body>
  <div class="app-container">
    <aside class="sidebar">
      <h2 class="sidebar-title">Devices</h2>
      <ul class="device-list">
        <li class="device-item">
          <div class="indicator active"></div>
          <div class="device-info">
            <span class="device-name">MacBook Pro</span>
            <span class="device-status">Active</span>
          </div>
        </li>
        <li class="device-item">
          <div class="indicator sending"></div>
          <div class="device-info">
            <span class="device-name">Linux Workstation</span>
            <span class="device-status">Sending</span>
          </div>
        </li>
        <li class="device-item">
          <div class="indicator idle"></div>
          <div class="device-info">
            <span class="device-name">iPhone</span>
            <span class="device-status">Idle</span>
          </div>
        </li>
      </ul>
    </aside>
    <main class="transfer-zone">
      <h1 class="main-title">Drop or Paste here to share</h1>
      <div class="drop-area" id="drop-area">
        <div class="rocket-icon">
          <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round" class="neon-svg">
            <path d="M4.5 16.5c-1.5 1.26-2 5-2 5s3.74-.5 5-2c.71-.84.7-2.13-.09-2.91a2.18 2.18 0 0 0-2.91-.09z"></path>
            <path d="m12 15-3-3a22 22 0 0 1 2-3.95A12.88 12.88 0 0 1 22 2c0 2.72-.78 7.5-6 11a22.35 22.35 0 0 1-4 2z">
            </path>
            <path d="M9 12H4s.55-3.03 2-4c1.62-1.08 5 0 5 0"></path>
            <path d="M12 15v5s3.03-.55 4-2c1.08-1.62 0-5 0-5"></path>
          </svg>
        </div>
      </div>
      <div class="transfer-progress">
        <div class="transfer-details">
          <span class="file-name">project_data.zip</span>
          <span class="transfer-target">to Linux Workstation</span>
        </div>
        <div class="progress-bar-container">
          <div class="progress-bar particle-effect"></div>
        </div>
        <div class="transfer-eta">ETA: 45s</div>
      </div>
    </main>
  </div>
  <script type="module" src="./main.js"></script>
</body>

</html>
